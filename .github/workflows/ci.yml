name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        variant: [default, no-ecosystem]
        config: [Debug, Release]
        include:
          - variant: default
            build_dir: build
            no_ecosystem: false
          - variant: no-ecosystem
            build_dir: build_noeco
            no_ecosystem: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure ecosystem is absent (no-ecosystem)
        if: matrix.no_ecosystem
        shell: pwsh
        run: |
          if (Test-Path ecosystem) {
            Remove-Item -Recurse -Force ecosystem
          }

      - name: Configure (${{ matrix.variant }} / ${{ matrix.config }})
        shell: pwsh
        run: cmake -S . -B ${{ matrix.build_dir }} -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build (${{ matrix.variant }} / ${{ matrix.config }})
        shell: pwsh
        run: cmake --build ${{ matrix.build_dir }} --config ${{ matrix.config }}

      - name: Test (${{ matrix.variant }} / ${{ matrix.config }})
        shell: pwsh
        run: |
          ctest --test-dir ${{ matrix.build_dir }} -C ${{ matrix.config }} --output-on-failure | Tee-Object -FilePath "${{ matrix.build_dir }}/ctest_${{ matrix.os }}_${{ matrix.variant }}_${{ matrix.config }}.txt"

      - name: Upload test logs (${{ matrix.variant }} / ${{ matrix.config }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.os }}-${{ matrix.variant }}-${{ matrix.config }}
          path: |
            ${{ matrix.build_dir }}/ctest_${{ matrix.os }}_${{ matrix.variant }}_${{ matrix.config }}.txt

  sanitizers:
    name: Sanitizers (clang, asan+ubsan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build_san \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-O1 -g -fno-omit-frame-pointer -fsanitize=address,undefined" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        shell: bash
        run: cmake --build build_san -j

      - name: Test
        shell: bash
        run: |
          ctest --test-dir build_san --output-on-failure -LE consumer | tee build_san/ctest_sanitizers.txt

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-ubuntu-sanitizers
          path: build_san/ctest_sanitizers.txt
