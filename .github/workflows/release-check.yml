name: Release Check

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (example: v0.1.0-alpha)"
        required: true
        default: "v0.1.0-alpha"

jobs:
  artifact:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}"
          $zip = "loxguard-$v.zip"
          git archive --format=zip --output=$zip HEAD
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$zip.sha256" -Value "$hash  $zip"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: loxguard-source-archive
          path: loxguard-*.zip

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: loxguard-source-checksum
          path: loxguard-*.zip.sha256
